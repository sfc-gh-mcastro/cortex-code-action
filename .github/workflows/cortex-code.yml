name: Cortex Code
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

jobs:
  cortex-code:
    # Only run if triggered by @cortex-code and not from a fork PR
    if: |
      contains(github.event.comment.body, '@cortex-code') &&
      (github.event.issue.pull_request == null || !github.event.issue.pull_request || github.event.repository.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: sfc-gh-mcastro/cortex-code-action@main
        with:
          snowflake_account: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          snowflake_user: ${{ secrets.SNOWFLAKE_USER }}
          snowflake_private_key: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
